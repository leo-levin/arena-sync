name: Arena Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: arena-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore state from state branch
        run: |
          git fetch origin state 2>/dev/null || true
          git show origin/state:state.json > state.json 2>/dev/null || echo '{}' > state.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run sync
        env:
          ARENA_TOKEN: ${{ secrets.ARENA_TOKEN }}
        run: python sync.py --config config.json --state state.json

      - name: Commit state to state branch
        run: |
          if [ ! -s state.json ] || [ "$(cat state.json)" = "{}" ]; then
            echo "No meaningful state to save."
            exit 0
          fi
          cp state.json /tmp/state.json
          git config user.name "arena-sync-bot"
          git config user.email "bot@arena-sync"
          git fetch origin state 2>/dev/null || true
          git checkout -B state origin/state 2>/dev/null || git checkout --orphan state
          git rm -rf . 2>/dev/null || true
          cp /tmp/state.json state.json
          git add state.json
          git diff --cached --quiet && echo "State unchanged." && exit 0
          git commit -m "state: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin state
